name: Drizzle Generate

on:
  push:
    paths:
      - "packages/**"
      - "templates/dmc/drizzle.config.ts"
      - "templates/dmc/migrations/**"
      - "templates/operator/drizzle.config.ts"
      - "templates/operator/migrations/**"
      - "pnpm-lock.yaml"
  pull_request:
    paths:
      - "packages/**"
      - "templates/dmc/drizzle.config.ts"
      - "templates/dmc/migrations/**"
      - "templates/operator/drizzle.config.ts"
      - "templates/operator/migrations/**"
      - "pnpm-lock.yaml"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Drizzle artifacts
        run: |
          pnpm db:generate
          pnpm -F operator db:generate

      - name: Check for diff
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Drizzle generate produced changes. Please commit generated artifacts." >&2
            git status --porcelain
            exit 1
          fi
