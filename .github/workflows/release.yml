name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_assets:
        description: "Create or refresh the GitHub release and starter assets for the current checked-in version"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-assets:
    if: github.event_name == 'workflow_dispatch' && inputs.release_assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter='./packages/**' --continue

      - name: Determine release version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          node -e "const semver = require('semver'); const version = process.argv[1]; if (!semver.valid(version)) { throw new Error(`Invalid release version: ${version}`); }" "$VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package starter archives
        run: pnpm package:starters -- --version ${{ steps.version.outputs.value }} --out-dir .release/starters

      - name: Ensure repo tag exists
        run: |
          if git rev-parse -q --verify refs/tags/v${{ steps.version.outputs.value }} >/dev/null; then
            echo "Tag v${{ steps.version.outputs.value }} already exists"
          else
            git tag v${{ steps.version.outputs.value }}
            git push origin v${{ steps.version.outputs.value }}
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: .release/starters/*.tar.gz

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify release train
        run: pnpm verify:release-train

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          createGithubReleases: false
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release version
        if: steps.changesets.outputs.published == 'true'
        id: version
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          node -e "const semver = require('semver'); const version = process.argv[1]; if (!semver.valid(version)) { throw new Error(`Invalid release version: ${version}`); }" "$VERSION"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package starter archives
        if: steps.changesets.outputs.published == 'true'
        run: pnpm package:starters -- --version ${{ steps.version.outputs.value }} --out-dir .release/starters

      - name: Ensure repo tag exists
        if: steps.changesets.outputs.published == 'true'
        run: |
          if git rev-parse -q --verify refs/tags/v${{ steps.version.outputs.value }} >/dev/null; then
            echo "Tag v${{ steps.version.outputs.value }} already exists"
          else
            git tag v${{ steps.version.outputs.value }}
            git push origin v${{ steps.version.outputs.value }}
          fi

      - name: Create GitHub release
        if: steps.changesets.outputs.published == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: .release/starters/*.tar.gz
