name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bootstrap:
        description: "Publish the current checked-in versions without creating a Changesets release PR"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bootstrap-release:
    if: github.event_name == 'workflow_dispatch' && inputs.bootstrap
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter='./packages/**' --continue

      - name: Publish current package versions
        run: pnpm changeset publish

      - name: Create repo tag for bootstrap release
        run: |
          if git rev-parse -q --verify refs/tags/v0.1.0 >/dev/null; then
            echo "Tag v0.1.0 already exists"
          else
            git tag v0.1.0
            git push origin v0.1.0
          fi

  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
