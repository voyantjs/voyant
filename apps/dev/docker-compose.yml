services:
  dev-db:
    image: postgres:16-alpine
    container_name: voyant-dev-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: voyant
      POSTGRES_PASSWORD: voyant
      POSTGRES_DB: voyant_dev
    volumes:
      - voyant_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voyant -d voyant_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  voyant_dev_data:
