services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: voyant
      POSTGRES_USER: voyant
      POSTGRES_PASSWORD: voyant
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voyant -d voyant"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - voyant-postgres-data:/var/lib/postgresql/data

  workflows:
    build:
      context: ../..
      dockerfile: apps/workflows-selfhost-node-server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: ${VOYANT_BIND_HOST:-0.0.0.0}
      PORT: ${VOYANT_BIND_PORT:-3232}
      DATABASE_URL: ${VOYANT_DATABASE_URL:-<set-postgres-connection-string>}
      VOYANT_ENTRY_FILE: ${VOYANT_ENTRY_FILE:-/app/workflows/bundle.mjs}
      VOYANT_SKIP_MIGRATIONS: ${VOYANT_SKIP_MIGRATIONS:-0}
      VOYANT_DATABASE_WAIT_SECONDS: ${VOYANT_DATABASE_WAIT_SECONDS:-30}
    ports:
      - "${VOYANT_HOST_PORT:-3232}:${VOYANT_BIND_PORT:-3232}"
    volumes:
      - ./dist/bundle.mjs:/app/workflows/bundle.mjs:ro

volumes:
  voyant-postgres-data:
